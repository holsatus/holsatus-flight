name: Common library tests and features

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Build base Holsatus Flight "common" library
      run: cargo build --no-default-features --manifest-path common/Cargo.toml --verbose

    - name: Build Holsatus Flight "common" library with "mpc"
      run: cargo build --no-default-features --manifest-path common/Cargo.toml --features "mpc" --verbose

    - name: Build Holsatus Flight "common" library with "mpc usb"
      run: cargo build --no-default-features --manifest-path common/Cargo.toml --features "mpc usb" --verbose

    - name: Build Holsatus Flight "common" library with "mpc usb mavlink"
      run: cargo build --no-default-features --manifest-path common/Cargo.toml --features "mpc usb mavlink" --verbose

    - name: Build Holsatus Flight "common" library with "mpc usb mavlink gnss"
      run: cargo build --no-default-features --manifest-path common/Cargo.toml --features "mpc usb mavlink gnss" --verbose

    - name: Run tests in Holsatus Flight "common" library
      run: cargo test --no-default-features --manifest-path common/Cargo.toml --features "std" --verbose -- --test-threads=1